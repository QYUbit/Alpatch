<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpatch Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .example {
            margin-bottom: 40px;
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 6px;
        }
        
        .example h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #555;
        }

        .example h3 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #555;
        }
        
        .example p {
            color: #666;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .example li {
            margin-left: 20px;
        }
        
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background: #467ebb;
            cursor: default;
        }

        #error-message {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Alpatch Examples</h1>

        <div x-data class="example">
            <h2>Patch html</h2>
            <button @click="$get('/message')">Fetch Message</button>
            <div id="message-box"></div>
        </div>

        <div x-data="{ count: 0 }" class="example">
            <h2>Patch state</h2>
            <button @click="$post('/increment')">Increment Count</button>
            <div>Count: <span x-text="count"></span></div>
        </div>

        <div x-data="{ name: 'Alice', age: 'unknowen' }" class="example">
            <h2>Patch state manually</h2>
            <button 
                @click="{ scope: { age } } = await $get('/age', { payload: { name }, autoPatchState: false })"
            >
                Get Age
            </button>
            <div x-text="`Name: ${name}, Age: ${age}`"></div>
        </div>

        <div x-data class="example">
            <h2>Form</h2>
            <form @submit.prevent="$post('/signin', { contentType: 'form' })">
                <div>
                    <label for="username">Enter username:</label>
                    <input type="text" name="username">
                </div>
                <div>
                    <label for="password">Enter password:</label>
                    <input type="password" name="password">
                </div>
                <button>Sign In</button>
                <div id="error-message"></div>
            </form>
        </div>

        <div x-data class="example">
            <h2>Using refs</h2>
            <button @click="$get('/messageRef')">Show Message</button>
            <div x-ref="message"></div>
        </div>

        <div x-data="{ text: '' }" class="example">
            <h2>Alpatch directive</h2>
            <input
                type="text"
                name="text"
                x-alpatch.input="'/repeat'"
                @input="text = $el.value"
            >
            <div id="repeated"></div>
        </div>

        <div x-data class="example">
            <h2>Redirect</h2>
            <a x-alpatch="'/toAbout'">About</a>
        </div>

        <div x-data="{ clicked: false }" class="example">
            <h2>Morph</h2>
            <button
                @click="clicked = true; Alpine.patchElement($el, { ref: 'morphTarget', html: $refs.morphSource.outerHTML, strategy: 'morph' })"
                :disabled="clicked"
            >
                Morph
            </button>
            <h3>Target</h3>
            <ul x-ref="morphTarget">
                <li>Element 1</li>
                <li>Element 2</li>
            </ul>
            <h3>Source</h3>
            <ul x-ref="morphSource">
                <li>Element 1</li>
                <li>Element 3</li>
            </ul>
        </div>
    </div>

    <script type="module">
        import Alpine from 'https://esm.sh/alpinejs@3';
        import morph from 'https://esm.sh/@alpinejs/morph@3';
        import Alpatch from '../dist/module.esm.js';
        
        Alpine.plugin(morph);
        Alpine.plugin(Alpatch);
        Alpine.start();

        window.Alpine = Alpine;
    </script>
</body>
</html>
